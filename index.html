<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./output.css">
    <title>Travis Salud</title>
</head>
<body>
    <header class="flex justify-between items-center py-4 px-6">
        <h1 class="logo">LOGO</h1>
        <nav class="hidden md:flex">
            <ul class="flex gap-4">
                <li><a href="#">About</a></li>
                <li><a href="#">Education</a></li>
                <li><a href="#">Projects</a></li>
                <li><a href="#">Experience</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
        <button id="themeToggle">Dark</button>
    </header>
    <main>
        <div class="flex flex-col justify-center items-center">
            <div>
                <img src="/assets/images/travis-profile-pic.jpg" alt="Profile Picture" class="rounded-full w-[200px]">
            </div>
            <h1>Hello! I'm Travis Salud 👋</h1>
            <p>Software Engineer</p>
            <div>
                <a href="#">LinkedIn</a>
                <a href="#">Github</a>
                <a href="#">Email</a>
            </div>
            <a href="#">Contact Me</a>
        </div>
        <section id="about">
            <div>About</div>
        </section>
        <section id="education">
            <div>Education</div>
        </section>
        <section id="projects">
            <div>Projects</div>
            <ol>
                <li>Project 1</li>
                <li>Project 2</li>
            </ol>
        </section>
        <section id="experience">
            <div>Experience</div>
        </section>
        <section id="contact">
            <div>Contact Me!</div>
            <form action="">
                <div>
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name">
                </div>
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">
                </div>
                <div>
                    <label for="message">Message</label>
                    <input type="text" id="message" name="message">
                </div>
            </form>
        </section>
    </main>
    <footer></footer>
</body>
</html>
